spring:
  application:
    name: marketing-dashboard
  datasource:
    url: "jdbc:sqlserver://marketing-ttok-tti-db-server.database.windows.net:1433;database=Marketing-Ttok-tti-DB;encrypt=true;trustServerCertificate=false;hostNameInCertificate=*.database.windows.net;loginTimeout=30;Authentication=ActiveDirectoryManagedIdentity;"

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info

azure:
  openai:
    api-key: "YOUR_AZURE_OPENAI_API_KEY"
    endpoint: "https://marketing-ttok-tti-froundry.services.ai.azure.com/api/projects/Marketing-Ttok-tti-Project"
    deployment: "gpt-5.5"
  search:
    endpoint: "https://marketing-ttok-tti-ai-search.search.windows.net"
    api-key: "YOUR_AZURE_SEARCH_API_KEY"
    
