<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BNK 프롬프트 기반 이미지 데모</title>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --red:#c8102e;--red-dark:#9b0b22;--ink:#1b1b19;--sub:#66655f;
      --bg:#f6f5f2;--card:#fff;--line:#e3e0da;
    }
    body{
      font-family:'Apple SD Gothic Neo','Noto Sans KR','Segoe UI',sans-serif;
      background:radial-gradient(1200px 500px at 10% -20%, #ffe9ed 0%, transparent 60%), var(--bg);
      color:var(--ink);
      min-height:100vh;
      padding:24px;
    }
    .wrap{max-width:1220px;margin:0 auto}
    .head{
      display:flex;align-items:flex-end;justify-content:space-between;gap:14px;
      margin-bottom:18px;
    }
    .ttl{font-size:1.45rem;font-weight:800;letter-spacing:-.02em}
    .sub{font-size:.86rem;color:var(--sub)}
    .grid{display:grid;grid-template-columns:420px 1fr;gap:18px}
    .panel,.result{background:var(--card);border:1px solid var(--line);border-radius:14px;box-shadow:0 6px 20px rgba(0,0,0,.06)}
    .ph{padding:14px 16px;border-bottom:1px solid var(--line);font-weight:800;color:#fff;background:linear-gradient(120deg,var(--red),#e1415a)}
    .pb{padding:16px}
    .field label{display:block;font-size:.82rem;font-weight:800;color:#4f4d47;margin-bottom:8px}
    textarea{
      width:100%;min-height:340px;resize:vertical;border:1.5px solid var(--line);border-radius:10px;
      padding:12px 13px;font-size:.92rem;line-height:1.55;background:#fbfbf9;color:var(--ink);outline:none;
      transition:border-color .18s,box-shadow .18s
    }
    textarea:focus{border-color:var(--red);box-shadow:0 0 0 3px rgba(200,16,46,.1)}
    .actions{display:flex;gap:10px;margin-top:12px}
    .btn{
      border:none;border-radius:10px;padding:12px 14px;font-size:.92rem;font-weight:800;cursor:pointer
    }
    .btn-main{background:var(--red);color:#fff;flex:1}
    .btn-main:hover{background:var(--red-dark)}
    .btn-ghost{background:#efede8;color:#55524a}
    .rb{padding:16px;min-height:560px;display:flex;flex-direction:column}
    .empty,.loader{flex:1;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:11px;color:#c6c1b7}
    .loader .spin{width:42px;height:42px;border-radius:50%;border:4px solid #e6e2db;border-top-color:var(--red);animation:spin .9s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    .res{display:flex;flex-direction:column;gap:10px}
    .res img{width:100%;border-radius:10px;border:1px solid var(--line)}
    .meta{display:flex;align-items:center;gap:10px;font-size:.8rem;color:#6a675f}
    .pill{background:#f0eeea;padding:3px 10px;border-radius:999px;font-weight:700;color:#4f4d47}
    .err{background:#fff2f4;border:1px solid #f8b4bf;color:#b21a34;padding:12px 14px;border-radius:10px;font-size:.88rem}
    details{margin-top:4px}
    summary{cursor:pointer;color:#7a756b;font-size:.78rem}
    .prompt{margin-top:8px;padding:10px 12px;background:#f7f6f3;border-radius:8px;color:#89857d;font-size:.75rem;white-space:pre-wrap;line-height:1.55}
    @media(max-width:980px){.grid{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="head">
      <div>
        <div class="ttl">BNK 프롬프트 기반 광고 이미지 데모</div>
        <div class="sub">입력은 마케팅 프롬프트 1개만 받고, 결과 이미지를 바로 생성합니다.</div>
      </div>
      <div class="sub">Endpoint: /generate-from-prompt · Size: 816x816</div>
    </div>

    <div class="grid">
      <section class="panel">
        <div class="ph">1) 프롬프트 입력</div>
        <div class="pb">
          <div class="field">
            <label for="inpPrompt">마케팅 요건 상세 프롬프트</label>
            <textarea id="inpPrompt" placeholder="예) 상품종류: 정기적금, 핵심혜택: 최대 연 5% 금리, 컨셉: 신뢰와 성장, 타깃: 2030 직장인, 분위기: 깔끔한 프리미엄 금융 광고..."></textarea>
          </div>
          <div class="actions">
            <button id="btnGen" class="btn btn-main" onclick="doGenerate()">이미지 생성</button>
            <button class="btn btn-ghost" onclick="document.getElementById('inpPrompt').value=''">입력 비우기</button>
          </div>
        </div>
      </section>

      <section class="result">
        <div class="ph">2) 생성 결과</div>
        <div class="rb" id="resultBody">
          <div class="empty">
            <div style="font-size:2rem">◌</div>
            <div>프롬프트를 입력하고 이미지를 생성하세요</div>
          </div>
        </div>
      </section>
    </div>
  </div>

  <script>
    async function doGenerate() {
      const prompt = document.getElementById('inpPrompt').value.trim();
      if (!prompt) {
        alert('프롬프트를 입력해주세요.');
        return;
      }

      const btn = document.getElementById('btnGen');
      btn.disabled = true;
      btn.textContent = '생성 중...';

      document.getElementById('resultBody').innerHTML =
        '<div class="loader"><div class="spin"></div><div>GPT-IMAGE-2로 생성 중...</div></div>';

      try {
        const res = await fetch('/generate-from-prompt', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({prompt})
        });
        const data = await res.json();

        if (!res.ok || data.error) {
          document.getElementById('resultBody').innerHTML =
            '<div class="err">오류: ' + (data.error || '알 수 없는 오류') + '</div>';
          return;
        }

        const imgSrc = 'data:image/png;base64,' + data.image;
        const fileName = 'bnk_prompt_demo_' + Date.now() + '.png';

        document.getElementById('resultBody').innerHTML =
          '<div class="res">' +
            '<img src="' + imgSrc + '" alt="생성 이미지" />' +
            '<div class="meta"><span class="pill">완료</span><span>' + data.size + '</span></div>' +
            '<div><button id="btnDl" class="btn btn-ghost">이미지 다운로드</button></div>' +
            '<details><summary>최종 프롬프트 보기</summary><div class="prompt">' + data.prompt.replace(/</g, '&lt;') + '</div></details>' +
          '</div>';

        document.getElementById('btnDl').addEventListener('click', function () {
          const a = document.createElement('a');
          a.href = imgSrc;
          a.download = fileName;
          a.click();
        });
      } catch (e) {
        document.getElementById('resultBody').innerHTML =
          '<div class="err">네트워크 오류: ' + e.message + '</div>';
      } finally {
        btn.disabled = false;
        btn.textContent = '이미지 생성';
      }
    }

    document.addEventListener('keydown', function (e) {
      if (e.ctrlKey && e.key === 'Enter') doGenerate();
    });
  </script>
</body>
</html>
