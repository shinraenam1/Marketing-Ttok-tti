<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>마케팅 분석 대시보드 | Ttok-tti</title>
    <style>
      :root { --bg:#0f1419; --panel:#1a1f2e; --line:#2f3b53; --text:#e6edff; --sub:#9fb0cc; --acc:#26a0ff; }
      * { box-sizing:border-box; }
      body { margin:0; font-family:Segoe UI, Arial, sans-serif; background:linear-gradient(135deg,#0f1419,#1a1f2e); color:var(--text); }
      .wrap { max-width:1400px; margin:0 auto; padding:18px; }
      header { text-align:center; margin-bottom:14px; }
      header h1 { margin:0; color:#59c3ff; }
      header p { margin:8px 0 0; color:var(--sub); }
      .grid { display:grid; grid-template-columns:1fr 1fr; gap:14px; }
      .panel { background:var(--panel); border:1px solid var(--line); border-radius:12px; overflow:hidden; }
      .ph { padding:12px 14px; border-bottom:1px solid var(--line); font-weight:700; color:#7fcfff; }
      .pc { padding:14px; }
      .card { background:rgba(255,255,255,0.03); border:1px solid var(--line); border-radius:10px; padding:12px; margin-bottom:12px; }
      h3 { margin:0 0 10px; font-size:16px; color:#7fcfff; }
      ol, ul { margin:0; padding-left:20px; }
      li { margin:6px 0; line-height:1.4; }
      .meta { color:var(--sub); font-size:13px; }
      .badge { border:1px solid #3c648f; padding:2px 8px; border-radius:999px; font-size:12px; color:#9dd4ff; }
      .row { display:flex; justify-content:space-between; gap:8px; align-items:center; }
      .cloud { display:flex; flex-wrap:wrap; gap:10px 14px; line-height:1.2; }
      .cloud-item {
        display:inline-block;
        color:#9dd4ff;
        background:rgba(38,160,255,.08);
        border:1px solid rgba(38,160,255,.2);
        border-radius:999px;
        padding:6px 10px;
      }
      .summary-grid { display:grid; gap:10px; }
      .summary-row {
        display:grid;
        grid-template-columns:1fr 1fr;
        gap:12px;
        background:rgba(37,99,235,.08);
        border:1px solid rgba(96,165,250,.25);
        border-radius:8px;
        padding:10px;
      }
      .summary-col {
        background:rgba(255,255,255,.02);
        border:1px solid rgba(255,255,255,.08);
        border-radius:8px;
        padding:8px;
      }
      .summary-title { font-weight:700; margin-bottom:6px; color:#cfe8ff; }
      .summary-reason { color:#dce7ff; font-size:13px; line-height:1.45; }
      .form label{display:grid;gap:6px;margin-bottom:10px;color:var(--sub);font-size:13px}
      .form select,.form button{border:1px solid var(--line);background:#141a27;color:var(--text);padding:10px;border-radius:8px}
      .form button{background:linear-gradient(135deg,#26a0ff,#4361ee);border:0;color:#fff;font-weight:700;cursor:pointer}
      .muted { color:var(--sub); }
      @media (max-width:960px){ .grid{grid-template-columns:1fr;} .summary-row{grid-template-columns:1fr;} }
    </style>
  </head>
  <body>
    <div class="wrap">
      <header>
        <h1>📊 마케팅 분석 대시보드</h1>
        <p>스크래핑 데이터 분석 및 맞춤형 홍보물 생성</p>
      </header>
      <div class="grid">
        <section class="panel">
          <div class="ph">📈 Step 1-2: 분석 결과</div>
          <div class="pc">
            <div class="card">
              <h3>☁ 카드사 혜택 카테고리 키워드 클라우드</h3>
              <div id="catCloud" class="cloud"></div>
            </div>
            <div class="card">
              <h3>☁ 유튜브 밈 키워드 클라우드</h3>
              <div id="memeCloud" class="cloud"></div>
            </div>
            <div class="card">
              <h3>💡 조합 요약 데이터 (10개)</h3>
              <div id="summaryGrid" class="summary-grid"></div>
            </div>
          </div>
        </section>
        <section class="panel">
          <div class="ph">🎯 Step 3-4: 맞춤형 콘텐츠</div>
          <div class="pc form">
            <label>연령대<select><option>20-30대</option><option>30-40대</option><option>전체</option></select></label>
            <label>직업/직군<select><option>직장인</option><option>학생</option><option>전체</option></select></label>
            <label>관심 카테고리<select><option>패션</option><option>여행</option><option>생활용품</option></select></label>
            <button type="button">Step 4: 홍보물 생성</button>
            <p class="muted">원본 스크래퍼 상세 결과는 화면에 노출하지 않습니다.</p>
          </div>
        </section>
      </div>
    </div>
    <script>
      const OPENAI_API_KEY = '';
      const OPENAI_MODEL = 'gpt-4o-mini';

      const CARD_CATEGORIES = [
        { category: '주유/교통', count: 93 },
        { category: '생활/구독', count: 51 },
        { category: '쇼핑', count: 37 },
        { category: '금융', count: 24 },
        { category: '여행/항공', count: 19 },
        { category: '통신', count: 4 },
        { category: '푸드/배달', count: 3 },
        { category: '교육', count: 2 },
        { category: '자동차', count: 2 },
        { category: '문화/엔터', count: 1 },
        { category: '기타', count: 1 }
      ];

      const MEME_TRENDS = [
        { keyword: '거제 야호', meme_score: 71, growth_rate_pct: 100 },
        { keyword: '주유 챌린지', meme_score: 64.9, growth_rate_pct: 100 },
        { keyword: '캐치캐치 밈', meme_score: 52.9, growth_rate_pct: 100 },
        { keyword: '메가고트', meme_score: 52.8, growth_rate_pct: 100 },
        { keyword: '퇴근 고트', meme_score: 52.7, growth_rate_pct: 100 },
        { keyword: 'do dance', meme_score: 52.0, growth_rate_pct: 100 },
        { keyword: '국민주행', meme_score: 41.4, growth_rate_pct: 100 },
        { keyword: '테크 릴스', meme_score: 40.9, growth_rate_pct: 100 },
        { keyword: '중독맨', meme_score: 40.7, growth_rate_pct: 100 },
        { keyword: 'dance', meme_score: 40.0, growth_rate_pct: 100 },
        { keyword: '가성비챌', meme_score: 38.6, growth_rate_pct: 100 }
      ];

      function normalizeText(v) {
        return String(v || '').replace(/\s+/g, ' ').trim();
      }

      function renderCloud(containerId, items, textKey, weightKey, unitLabel) {
        const root = document.getElementById(containerId);
        if (!root) return;
        const weights = items.map((item) => Number(item?.[weightKey] || 0));
        const min = Math.min(...weights);
        const max = Math.max(...weights);

        root.innerHTML = items.map((item) => {
          const w = Number(item?.[weightKey] || 0);
          const ratio = max === min ? 1 : (w - min) / (max - min);
          const size = Math.round(14 + ratio * 24);
          const title = normalizeText(item?.[textKey]);
          return `<span class="cloud-item" style="font-size:${size}px" title="${w}${unitLabel}">${title}</span>`;
        }).join('');
      }

      async function generateAiReason(kind, item, counterpart) {
        if (!OPENAI_API_KEY) {
          if (kind === 'category') {
            return `AI 키 미설정: ${item.category} 카테고리는 현재 ${item.count}건으로 집계되어 소비자의 체감 혜택 수요가 높은 구간입니다.`;
          }
          return `AI 키 미설정: ${item.keyword} 밈은 점수 ${Math.round(item.meme_score || 0)}와 성장률 ${Math.round(item.growth_rate_pct || 0)}%로 확산성이 높습니다.`;
        }

        const prompt = kind === 'category'
          ? `당신은 카드사 마케팅 전략가입니다. 카테고리 '${item.category}' 이벤트가 ${item.count}건 많은 이유를 한국어 1문장으로 설명하세요. 참고 밈: '${counterpart.keyword}'.`
          : `당신은 디지털 트렌드 분석가입니다. 밈 '${item.keyword}'(점수 ${Math.round(item.meme_score || 0)}, 성장률 ${Math.round(item.growth_rate_pct || 0)}%)이 유행하는 이유를 한국어 1문장으로 설명하세요. 참고 카테고리: '${counterpart.category}'.`;

        try {
          const res = await fetch('https://api.openai.com/v1/responses', {
            method: 'POST',
            headers: {
              'Authorization': `Bearer ${OPENAI_API_KEY}`,
              'Content-Type': 'application/json'
            },
            body: JSON.stringify({
              model: OPENAI_MODEL,
              input: prompt,
              max_output_tokens: 120,
              temperature: 0.4
            })
          });

          if (!res.ok) throw new Error('openai_failed');
          const json = await res.json();
          const text = (json.output_text || '').trim();
          if (!text) throw new Error('empty');
          return text;
        } catch {
          if (kind === 'category') {
            return `${item.category} 카테고리는 혜택 체감이 즉시 가능한 소비 구간이라 이벤트 집행 밀도가 높습니다.`;
          }
          return `${item.keyword} 밈은 짧은 포맷에서 재생산이 쉬워 소셜에서 빠르게 확산됩니다.`;
        }
      }

      function buildTenPairs(categories, memes) {
        const pairs = [];
        for (let i = 0; i < 10; i += 1) {
          pairs.push({
            category: categories[i % categories.length],
            meme: memes[i % memes.length]
          });
        }
        return pairs;
      }

      async function render(){
        const cats = [...CARD_CATEGORIES].sort((a,b)=>b.count-a.count);
        const memes = [...MEME_TRENDS].sort((a,b)=>b.meme_score-a.meme_score);

        renderCloud('catCloud', cats, 'category', 'count', '건');
        renderCloud('memeCloud', memes, 'keyword', 'meme_score', '점');

        const topMeme = memes[0];
        const topCategory = cats[0];

        const categoryReasonMap = new Map();
        const memeReasonMap = new Map();

        await Promise.all(cats.map(async (c) => {
          const reason = await generateAiReason('category', c, topMeme);
          categoryReasonMap.set(c.category, reason);
        }));

        await Promise.all(memes.map(async (m) => {
          const reason = await generateAiReason('meme', m, topCategory);
          memeReasonMap.set(m.keyword, reason);
        }));

        const pairs = buildTenPairs(cats, memes);
        const grid = document.getElementById('summaryGrid');
        grid.innerHTML = pairs.map((pair, idx) => `
          <div class="summary-row">
            <div class="summary-col">
              <div class="summary-title">${idx + 1}. 카드사 혜택 카테고리: ${pair.category.category} (${pair.category.count}건)</div>
              <div class="summary-reason">${categoryReasonMap.get(pair.category.category) || ''}</div>
            </div>
            <div class="summary-col">
              <div class="summary-title">밈: ${pair.meme.keyword} (점수 ${Math.round(pair.meme.meme_score || 0)})</div>
              <div class="summary-reason">${memeReasonMap.get(pair.meme.keyword) || ''}</div>
            </div>
          </div>
        `).join('');
      }

      render();
    </script>
  </body>
</html>
